services:
  postgres:
    image: postgres:15-alpine
    container_name: oleo_postgres
    restart: always
    environment:
      POSTGRES_USER: user_oleo
      POSTGRES_PASSWORD: password_oleo
      POSTGRES_DB: oleo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: oleo_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
