<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiauChat - Assistente Felino</title>
    <link rel="icon" type="image/x-icon" href="../../images/ml5w3s.ico">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        #chat-container {
            width: 450px;
            max-width: 95%;
            height: 85vh;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #chat-header {
            background: #ff9f43;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        #chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 10px 14px;
            border-radius: 18px;
            max-width: 85%;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .bot {
            background: #f1f2f6;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .user {
            background: #ff9f43;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        #chat-input-area {
            display: flex;
            padding: 12px;
            border-top: 1px solid #eee;
            background: #fff;
            flex-shrink: 0;
        }
        #chat-input {
            flex: 1;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            outline: none;
            font-size: 16px; /* Evita zoom automático no iOS */
        }
        #send-btn {
            background: #ff9f43;
            color: white;
            border: none;
            padding: 0 18px;
            margin-left: 8px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        #send-btn:active {
            background: #ee5253;
        }
        .back-link {
            text-align: center;
            padding: 8px;
            font-size: 0.85rem;
            background: #f8f9fa;
        }
        .back-link a {
            color: #666;
            text-decoration: none;
        }

        /* Ajustes para telas muito pequenas */
        @media (max-width: 480px) {
            #chat-container {
                width: 100%;
                height: 100vh;
                max-width: 100%;
                border-radius: 0;
            }
            .message {
                font-size: 0.9rem;
            }
        }

<script src="script.js"></script>
</body>
</html>
