<script>
// Horário compacto: durante a semana 08:00–18:00, sábado 08:00–12:00
(function(){
  const schedule = {
    weekdays: [{start: '08:00', end: '18:00'}], // Segunda a Sexta
    6: [{start: '08:00', end: '12:00'}]         // Sábado (6)
  };

  function toMinutes(t){
    const [h,m='0'] = t.split(':');
    return Number(h)*60 + Number(m);
  }

  function getIntervalsForDay(day){
    if(day >= 1 && day <= 5) return schedule.weekdays;
    return schedule[day] || null; // domingo ficará null (fechado)
  }

  function isOpen(date = new Date()){
    const day = date.getDay();
    const intervals = getIntervalsForDay(day);
    if(!intervals) return false;
    const now = date.getHours()*60 + date.getMinutes();
    return intervals.some(i => now >= toMinutes(i.start) && now < toMinutes(i.end));
  }

  function renderSchedule(){
    const dl = document.getElementById('opening-list');
    if(!dl) return;
    dl.innerHTML = '';
    // Durante a semana (Seg–Sex)
    const dtWeek = document.createElement('dt');
    dtWeek.textContent = 'Durante a semana';
    const ddWeek = document.createElement('dd');
    const w = schedule.weekdays[0];
    ddWeek.innerHTML = `<time datetime="${w.start}">${w.start}</time> às <time datetime="${w.end}">${w.end}</time>`;
    dl.appendChild(dtWeek);
    dl.appendChild(ddWeek);

    // Sábado
    const dtSat = document.createElement('dt');
    dtSat.textContent = 'Sáb.';
    const ddSat = document.createElement('dd');
    const sat = schedule[6][0];
    ddSat.innerHTML = `<time datetime="${sat.start}">${sat.start}</time> às <time datetime="${sat.end}">${sat.end}</time>`;
    dl.appendChild(dtSat);
    dl.appendChild(ddSat);

    // Domingo — fechado
    const dtSun = document.createElement('dt');
    dtSun.textContent = 'Dom.';
    const ddSun = document.createElement('dd');
    ddSun.textContent = 'Fechado';
    dl.appendChild(dtSun);
    dl.appendChild(ddSun);
  }

  function updateStatus(){
    const s = document.getElementById('opening-status');
    const container = document.getElementById('opening-hours');
    if(!s || !container) return;
    const open = isOpen();
    s.textContent = open ? 'Aberto agora' : 'Fechado';
    if(open) container.classList.remove('closed'); else container.classList.add('closed');
  }

  renderSchedule();
  updateStatus();
  setInterval(updateStatus, 30_000);
})();
</script>
